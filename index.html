<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão da Copa do Mundo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; min-height: 100vh; }
    #root { min-height: 100vh; }
    input { font-family: inherit; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;
    
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAocYorgMDHSf2y8rCeaVyvT7DztI",
      authDomain: "bolao-copa-5750f.firebaseapp.com",
      projectId: "bolao-copa-5750f",
      storageBucket: "bolao-copa-5750f.firebasestorage.app",
      messagingSenderId: "195737276586",
      appId: "1:195737276586:web:f9e5787a879d9400534Od3"
    };

    const ENTRADA = 50;
    const SPLIT = { champion: 0.5, brazil: 0.5 };
    const BRAZIL_PRIZE = { first: 0.7, second: 0.2, third: 0.1 };

    const TEAMS = [
      { name: "Brasil", flag: "🇧🇷" }, { name: "Argentina", flag: "🇦🇷" }, { name: "França", flag: "🇫🇷" },
      { name: "Inglaterra", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" }, { name: "Espanha", flag: "🇪🇸" }, { name: "Alemanha", flag: "🇩🇪" },
      { name: "Portugal", flag: "🇵🇹" }, { name: "Países Baixos", flag: "🇳🇱" }, { name: "Bélgica", flag: "🇧🇪" },
      { name: "Uruguai", flag: "🇺🇾" }, { name: "Croácia", flag: "🇭🇷" }, { name: "Marrocos", flag: "🇲🇦" },
      { name: "EUA", flag: "🇺🇸" }, { name: "Japão", flag: "🇯🇵" }, { name: "Colômbia", flag: "🇨🇴" },
      { name: "México", flag: "🇲🇽" }, { name: "Outro", flag: "🌍" },
    ];

    const BRAZIL_GAMES = [
      { id: "g1", phase: "Grupos", label: "Jogo 1", opponent: "Marrocos", flag: "🇲🇦" },
      { id: "g2", phase: "Grupos", label: "Jogo 2", opponent: "Haiti", flag: "🇭🇹" },
      { id: "g3", phase: "Grupos", label: "Jogo 3", opponent: "Escócia", flag: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
      { id: "r16", phase: "Oitavas", label: "Oitavas", opponent: "Adversário", flag: "🌐" },
      { id: "qf", phase: "Quartas", label: "Quartas", opponent: "Adversário", flag: "🌐" },
      { id: "sf", phase: "Semi", label: "Semifinal", opponent: "Adversário", flag: "🌐" },
      { id: "final", phase: "Final", label: "Final", opponent: "Adversário", flag: "🌐" },
    ];

    const fmt = (v) => `R$ ${v.toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;

    // Firebase Functions
    const initFirebase = async () => {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getFirestore } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      
      const app = initializeApp(firebaseConfig);
      return getFirestore(app);
    };

    const loadEntries = async (db) => {
      try {
        const { collection, getDocs, query, orderBy } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        const q = query(collection(db, "apostas"), orderBy("timestamp", "asc"));
        const querySnapshot = await getDocs(q);
        return querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } catch (err) {
        console.error("Erro ao carregar:", err);
        return [];
      }
    };

    const saveEntry = async (db, entry) => {
      try {
        const { collection, addDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        await addDoc(collection(db, "apostas"), entry);
        return true;
      } catch (err) {
        console.error("Erro ao salvar:", err);
        return false;
      }
    };

    function BolaoApp() {
      const [db, setDb] = useState(null);
      const [screen, setScreen] = useState("home");
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [shareSuccess, setShareSuccess] = useState(false);
      const [showLinkModal, setShowLinkModal] = useState(false);
      const [name, setName] = useState("");
      const [champion, setChampion] = useState(null);
      const [customChampion, setCustomChampion] = useState("");
      const [scores, setScores] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState("");

      useEffect(() => {
        initFirebase().then(dbInstance => {
          setDb(dbInstance);
          loadEntries(dbInstance).then(data => {
            setEntries(data);
            setLoading(false);
          });
        });
      }, []);

      const reloadEntries = useCallback(async () => {
        if (db) {
          setLoading(true);
          const data = await loadEntries(db);
          setEntries(data);
          setLoading(false);
        }
      }, [db]);

      useEffect(() => {
        if (screen === "board" || screen === "prize") {
          reloadEntries();
        }
      }, [screen, reloadEntries]);

      const handleSubmit = async () => {
        if (!name.trim()) return setError("Digite seu nome!");
        if (!champion) return setError("Escolha o campeão!");
        if (champion.name === "Outro" && !customChampion.trim()) return setError("Digite o país!");
        
        const allFilled = BRAZIL_GAMES.every(g => {
          const s = scores[g.id];
          return s && s.brazil !== "" && s.opponent !== "";
        });
        if (!allFilled) return setError("Preencha todos os 7 jogos!");

        setSaving(true);
        setError("");

        const entry = {
          name: name.trim(),
          champion: champion.name === "Outro" ? { name: customChampion.trim(), flag: "🌍" } : champion,
          scores,
          date: new Date().toLocaleDateString("pt-BR"),
          timestamp: Date.now()
        };

        const success = await saveEntry(db, entry);
        
        if (success) {
          setSubmitted(true);
          setTimeout(() => {
            setSubmitted(false);
            setName(""); setChampion(null); setCustomChampion(""); setScores({}); setError("");
            setScreen("board");
            reloadEntries();
          }, 1800);
        } else {
          setError("Erro ao salvar. Tente novamente.");
        }
        setSaving(false);
      };

      const handleShare = () => {
        if (navigator.share) {
          navigator.share({
            title: "Bolão da Copa",
            text: "⚽ Participe! R$50 de entrada.",
            url: window.location.href
          }).catch(() => setShowLinkModal(true));
        } else {
          setShowLinkModal(true);
        }
      };

      const copyLink = () => {
        navigator.clipboard.writeText(window.location.href).then(() => {
          setShareSuccess(true);
          setShowLinkModal(false);
          setTimeout(() => setShareSuccess(false), 2500);
        }).catch(() => {
          const input = document.createElement("input");
          input.value = window.location.href;
          document.body.appendChild(input);
          input.select();
          document.execCommand("copy");
          document.body.removeChild(input);
          setShareSuccess(true);
          setShowLinkModal(false);
          setTimeout(() => setShareSuccess(false), 2500);
        });
      };

      const total = entries.length * ENTRADA;
      const pots = { champion: total * SPLIT.champion, brazil: total * SPLIT.brazil };
      const championCounts = Object.entries(
        entries.reduce((acc, e) => {
          acc[e.champion.name] = (acc[e.champion.name] || 0) + 1;
          return acc;
        }, {})
      ).sort((a, b) => b[1] - a[1]).slice(0, 5);

      const tabs = [
        { id: "home", label: "Início" },
        { id: "form", label: "Apostar" },
        { id: "board", label: `Placar (${entries.length})` },
        { id: "prize", label: "💰 Prêmios" },
      ];

      if (!db) return <div style={{ textAlign: "center", paddingTop: "100px" }}>Carregando...</div>;

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", color: "#fff", position: "relative" }}>
          {shareSuccess && (
            <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", zIndex: 1001, background: "linear-gradient(135deg, #4caf50, #66bb6a)", color: "#fff", padding: "14px 28px", borderRadius: 12, fontWeight: 600 }}>
              ✓ Link copiado!
            </div>
          )}

          {showLinkModal && (
            <div onClick={() => setShowLinkModal(false)} style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
              <div onClick={(e) => e.stopPropagation()} style={{ background: "#1e2a3a", borderRadius: 16, padding: "28px", maxWidth: 500, width: "100%", border: "1px solid rgba(255,193,7,0.3)" }}>
                <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>📤 Compartilhar</h3>
                <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "14px", marginBottom: 16, wordBreak: "break-all", fontSize: 13 }}>
                  {window.location.href}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={copyLink} style={{ flex: 1, background: "linear-gradient(135deg, #ffc107, #ff9800)", color: "#000", border: "none", borderRadius: 10, padding: "12px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                    📋 Copiar
                  </button>
                  <button onClick={() => setShowLinkModal(false)} style={{ background: "rgba(255,255,255,0.1)", color: "#fff", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "12px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                    Fechar
                  </button>
                </div>
              </div>
            </div>
          )}

          <header style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(255,193,7,0.2)" }}>
            <div style={{ maxWidth: 800, margin: "0 auto", padding: "16px 20px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 10, background: "linear-gradient(135deg, #ffc107, #ff9800)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🏆</div>
                  <div><div style={{ fontSize: 20, fontWeight: 700 }}>Bolão da Copa</div><div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)" }}>R$50/pessoa</div></div>
                </div>
                <button onClick={handleShare} style={{ background: "linear-gradient(135deg, #25d366, #128c7e)", color: "#fff", border: "none", borderRadius: 10, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                  📤 Compartilhar
                </button>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setScreen(t.id)} style={{ background: screen === t.id ? "linear-gradient(135deg, #ffc107, #ff9800)" : "rgba(255,255,255,0.08)", color: screen === t.id ? "#000" : "#fff", border: "none", borderRadius: 10, padding: "7px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main style={{ maxWidth: 800, margin: "0 auto", padding: "32px 16px 80px", zIndex: 10 }}>
            {screen === "home" && (
              <div style={{ textAlign: "center", padding: "20px 0" }}>
                <div style={{ fontSize: 72, marginBottom: 16 }}>⚽</div>
                <h1 style={{ fontSize: 36, fontWeight: 700, marginBottom: 8 }}>Bolão da Copa do Mundo</h1>
                <p style={{ color: "rgba(255,255,255,0.7)", fontSize: 15, marginBottom: 28 }}>Aposte no campeão e nos placares do Brasil!</p>
                
                {entries.length > 0 && (
                  <div style={{ background: "rgba(255,193,7,0.1)", border: "1px solid rgba(255,193,7,0.3)", borderRadius: 16, padding: "20px", marginBottom: 28, maxWidth: 380, margin: "0 auto 28px" }}>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>POTE TOTAL</div>
                    <div style={{ fontSize: 44, fontWeight: 700, color: "#ffc107" }}>{fmt(total)}</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginTop: 4 }}>{entries.length} participante{entries.length > 1 ? "s" : ""}</div>
                  </div>
                )}

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 32, maxWidth: 560, margin: "0 auto 32px" }}>
                  <div style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: "24px 18px" }}>
                    <div style={{ fontSize: 32, marginBottom: 10 }}>🏆</div>
                    <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6 }}>Campeão</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginBottom: 10 }}>Divide entre acertos</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#ffc107" }}>{fmt(pots.champion)}</div>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: "24px 18px" }}>
                    <div style={{ fontSize: 32, marginBottom: 10 }}>🇧🇷</div>
                    <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6 }}>Brasil</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginBottom: 10 }}>Top 3 por pontos</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#ffc107" }}>{fmt(pots.brazil)}</div>
                  </div>
                </div>

                <button onClick={() => setScreen("form")} style={{ background: "linear-gradient(135deg, #ffc107, #ff9800)", color: "#000", border: "none", borderRadius: 12, padding: "14px 40px", fontSize: 16, fontWeight: 700, cursor: "pointer", boxShadow: "0 6px 24px rgba(255,193,7,0.4)" }}>
                  Fazer Aposta →
                </button>
              </div>
            )}

            {screen === "form" && (
              <div>
                {submitted ? (
                  <div style={{ textAlign: "center", padding: "80px 0" }}>
                    <div style={{ fontSize: 72, marginBottom: 16 }}>🎉</div>
                    <h2 style={{ fontSize: 28, fontWeight: 700, marginBottom: 8 }}>Aposta registrada!</h2>
                    <p style={{ color: "rgba(255,255,255,0.6)" }}>Boa sorte!</p>
                  </div>
                ) : (
                  <>
                    <h2 style={{ fontSize: 24, fontWeight: 700, marginBottom: 4 }}>Sua Aposta</h2>
                    <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 24, fontSize: 13 }}>
                      Entrada: <strong style={{ color: "#ffc107" }}>R$50</strong>
                    </p>

                    <div style={{ marginBottom: 24 }}>
                      <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>👤 Seu Nome</h3>
                      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Ex: João Silva"
                        style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "13px 16px", color: "#fff", fontSize: 15, outline: "none" }} />
                    </div>

                    <div style={{ marginBottom: 24 }}>
                      <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>🏆 Campeão da Copa</h3>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(80px, 1fr))", gap: 8 }}>
                        {TEAMS.map(t => (
                          <button key={t.name} onClick={() => { setChampion(t); setCustomChampion(""); }} 
                            style={{ background: champion?.name === t.name ? "linear-gradient(135deg, #ffc107, #ff9800)" : "rgba(255,255,255,0.06)", color: champion?.name === t.name ? "#000" : "#fff", border: champion?.name === t.name ? "2px solid #ffc107" : "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 6px", cursor: "pointer", fontSize: 11, fontWeight: 600, textAlign: "center", gridColumn: t.name === "Outro" ? "1 / -1" : "auto" }}>
                            {t.name === "Outro" ? (
                              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                                <span style={{ fontSize: 18 }}>{t.flag}</span><span>Outro país</span>
                              </div>
                            ) : (
                              <><div style={{ fontSize: 22, marginBottom: 4 }}>{t.flag}</div><div>{t.name}</div></>
                            )}
                          </button>
                        ))}
                      </div>
                      {champion?.name === "Outro" && (
                        <input value={customChampion} onChange={(e) => setCustomChampion(e.target.value)} placeholder="Nome do país..."
                          style={{ marginTop: 10, width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "13px 16px", color: "#fff", fontSize: 15, outline: "none" }} />
                      )}
                    </div>

                    <div style={{ marginBottom: 24 }}>
                      <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>🇧🇷 Placares do Brasil (7 jogos)</h3>
                      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        {BRAZIL_GAMES.map(game => {
                          const s = scores[game.id] || { brazil: "", opponent: "" };
                          return (
                            <div key={game.id} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "14px 16px" }}>
                              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                                <div>
                                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginBottom: 1, textTransform: "uppercase" }}>{game.phase}</div>
                                  <div style={{ fontSize: 13, fontWeight: 600 }}>{game.label}</div>
                                </div>
                                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)" }}>{game.flag} {game.opponent}</div>
                              </div>
                              <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 10, alignItems: "center" }}>
                                <div style={{ textAlign: "center" }}>
                                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>🇧🇷</div>
                                  <input type="number" min="0" max="20" value={s.brazil} onChange={(e) => setScores(prev => ({ ...prev, [game.id]: { ...prev[game.id], brazil: e.target.value } }))}
                                    style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 8, padding: "10px", color: "#fff", fontSize: 18, fontWeight: 700, textAlign: "center", outline: "none" }} />
                                </div>
                                <div style={{ fontSize: 20, fontWeight: 700, color: "rgba(255,255,255,0.3)" }}>×</div>
                                <div style={{ textAlign: "center" }}>
                                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>{game.flag}</div>
                                  <input type="number" min="0" max="20" value={s.opponent} onChange={(e) => setScores(prev => ({ ...prev, [game.id]: { ...prev[game.id], opponent: e.target.value } }))}
                                    style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 8, padding: "10px", color: "#fff", fontSize: 18, fontWeight: 700, textAlign: "center", outline: "none" }} />
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {error && (
                      <div style={{ background: "rgba(244,67,54,0.2)", border: "1px solid rgba(244,67,54,0.5)", borderRadius: 10, padding: "12px 16px", marginBottom: 14, color: "#ff8a80", fontSize: 13, textAlign: "center" }}>
                        ⚠️ {error}
                      </div>
                    )}

                    <button onClick={handleSubmit} disabled={saving} style={{ width: "100%", background: saving ? "rgba(255,193,7,0.3)" : "linear-gradient(135deg, #ffc107, #ff9800)", color: "#000", border: "none", borderRadius: 12, padding: "15px", fontSize: 16, fontWeight: 700, cursor: saving ? "not-allowed" : "pointer" }}>
                      {saving ? "Salvando..." : "⚽ Confirmar Aposta!"}
                    </button>
                  </>
                )}
              </div>
            )}

            {screen === "board" && (
              <div>
                <h2 style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>📋 Apostas</h2>
                <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 20, fontSize: 13 }}>
                  {loading ? "Carregando..." : `${entries.length} aposta${entries.length !== 1 ? "s" : ""} · Pote: ${fmt(total)}`}
                </p>

                {loading ? (
                  <div style={{ textAlign: "center", padding: "60px 0", color: "rgba(255,255,255,0.5)" }}>
                    <div style={{ fontSize: 40, marginBottom: 12 }}>⏳</div>Carregando...
                  </div>
                ) : entries.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "60px 0" }}>
                    <div style={{ fontSize: 56, marginBottom: 16 }}>📭</div>
                    <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 20 }}>Nenhuma aposta ainda!</p>
                    <button onClick={() => setScreen("form")} style={{ background: "linear-gradient(135deg, #ffc107, #ff9800)", color: "#000", border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                      Fazer Aposta
                    </button>
                  </div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {entries.map((e, i) => (
                      <div key={e.id} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: "18px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <div style={{ background: "linear-gradient(135deg, #ffc107, #ff9800)", borderRadius: "50%", width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: "#000" }}>{i + 1}</div>
                            <span style={{ fontWeight: 600, fontSize: 16 }}>{e.name}</span>
                          </div>
                          <span style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{e.date}</span>
                        </div>
                        <div style={{ marginBottom: 14 }}>
                          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 6 }}>🏆 Campeão</div>
                          <div style={{ fontSize: 15, fontWeight: 600 }}>{e.champion.flag} {e.champion.name}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 8 }}>🇧🇷 Placares</div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(90px, 1fr))", gap: 6 }}>
                            {BRAZIL_GAMES.map(g => {
                              const s = e.scores[g.id];
                              return (
                                <div key={g.id} style={{ background: "rgba(0,0,0,0.2)", borderRadius: 6, padding: "8px", textAlign: "center" }}>
                                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", marginBottom: 2 }}>{g.phase}</div>
                                  <div style={{ fontSize: 15, fontWeight: 700 }}>{s.brazil} × {s.opponent}</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {screen === "prize" && (
              <div>
                <h2 style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>💰 Premiação</h2>
                <p style={{ color: "rgba(255,255,255,0.5)", marginBottom: 24, fontSize: 13 }}>
                  {entries.length} participante{entries.length !== 1 ? "s" : ""} × R$50 = <strong style={{ color: "#ffc107" }}>{fmt(total)}</strong>
                </p>

                <div style={{ background: "linear-gradient(135deg, rgba(255,193,7,0.15), rgba(255,152,0,0.1))", border: "2px solid rgba(255,193,7,0.4)", borderRadius: 16, padding: "24px", textAlign: "center", marginBottom: 20 }}>
                  <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", marginBottom: 6 }}>POTE TOTAL</div>
                  <div style={{ fontSize: 48, fontWeight: 700, color: "#ffc107" }}>{fmt(total)}</div>
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,193,7,0.3)", borderRadius: 14, padding: "20px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                      <div><div style={{ fontSize: 17, fontWeight: 700, marginBottom: 3 }}>🏆 Campeão</div><div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Divide entre acertos</div></div>
                      <div style={{ fontSize: 24, fontWeight: 700, color: "#ffc107" }}>{fmt(pots.champion)}</div>
                    </div>
                    {championCounts.length > 0 && (
                      <div>
                        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginBottom: 6 }}>APOSTAS POPULARES</div>
                        {championCounts.slice(0, 3).map(([team, count]) => (
                          <div key={team} style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12 }}>
                            <span>{team}</span><span style={{ color: "rgba(255,255,255,0.5)" }}>{count}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(76,175,80,0.3)", borderRadius: 14, padding: "20px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                      <div><div style={{ fontSize: 17, fontWeight: 700, marginBottom: 3 }}>🇧🇷 Brasil</div><div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Ranking por pontos</div></div>
                      <div style={{ fontSize: 24, fontWeight: 700, color: "#4caf50" }}>{fmt(pots.brazil)}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {[
                        { emoji: "🥇", label: "1º lugar", pct: BRAZIL_PRIZE.first, color: "#ffc107" },
                        { emoji: "🥈", label: "2º lugar", pct: BRAZIL_PRIZE.second, color: "#c0c0c0" },
                        { emoji: "🥉", label: "3º lugar", pct: BRAZIL_PRIZE.third, color: "#cd7f32" },
                      ].map(p => (
                        <div key={p.label} style={{ background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ fontSize: 13, fontWeight: 600 }}>{p.emoji} {p.label}</span>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 17, fontWeight: 700, color: p.color }}>{fmt(pots.brazil * p.pct)}</div>
                            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{(p.pct * 100).toFixed(0)}%</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BolaoApp />);
  </script>
</body>
</html>
